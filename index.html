<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Congratulations!!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .content {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #0d1a36;
            line-height: 1.3;
        }

        .timer-container {
            background: #e8f5e9;
            border: 2px solid #2e9c4a;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 32px;
            display: inline-block;
            min-width: 140px;
        }

        .timer-text {
            font-size: 1.05rem;
            color: #1b5e20;
            font-weight: 600;
            margin-bottom: 8px;
        }

        #countdown {
            font-size: 2.4rem;
            font-weight: 800;
            color: #d32f2f;
            line-height: 1;
        }

        .btn {
            background: #0d6e2e;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.35rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(13, 110, 46, 0.35);
            min-height: 60px;
            width: 100%;
            max-width: 380px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background: #0a5a24;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(13, 110, 46, 0.45);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(13, 110, 46, 0.3);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .footer {
            margin-top: 45px;
            font-size: 0.85rem;
            color: #d32f2f;
            line-height: 1.5;
        }

        .footer a {
            color: #d32f2f;
            text-decoration: none;
            border-bottom: 1px solid #d32f2f;
            padding-bottom: 2px;
        }

        .footer a:hover {
            opacity: 0.85;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.9rem;
                margin-bottom: 20px;
            }
            .timer-container {
                padding: 12px;
                min-width: 130px;
            }
            .timer-text {
                font-size: 1rem;
            }
            #countdown {
                font-size: 2.2rem;
            }
            .btn {
                padding: 18px 32px;
                font-size: 1.25rem;
                max-width: 100%;
            }
            .footer {
                font-size: 0.82rem;
                margin-top: 40px;
            }
        }

        @media (max-width: 360px) {
            .content {
                padding: 16px;
            }
            h1 {
                font-size: 1.75rem;
            }
            #countdown {
                font-size: 2rem;
            }
            .btn {
                padding: 17px 28px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Congratulations!!</h1>

        <div class="timer-container">
            <div class="timer-text">Time remaining:</div>
            <div id="countdown">5</div>
            <div class="timer-text">Click on "START NOW" to cash out!</div>
        </div>

        <button class="btn" id="startBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 17l-5-5 5-5z"/>
            </svg>
            START NOW
        </button>

        <div class="footer">
            © 2026. All rights reserved. | 
            <a href="https://malawiansadsversion3.blogspot.com/" target="_blank" rel="noopener noreferrer">Privacy Policy</a> | 
            <a href="#" onclick="alert('Terms & Conditions Apply'); return false;">Terms & Conditions Apply</a>
        </div>
    </div>

    <script>
        // 5-second countdown with auto-redirect
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        const btn = document.getElementById('startBtn');
        let timerRunning = true;

        // Update display immediately
        countdownEl.textContent = seconds;

        // Start countdown
        const interval = setInterval(() => {
            if (!timerRunning) {
                clearInterval(interval);
                return;
            }

            seconds--;
            countdownEl.textContent = seconds;
        }, 1000);

        // Button click handler (instant redirect, stops timer)
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            timerRunning = false;
            clearInterval(interval);
            window.location.href = 'https://1buv.com/link?z=10462815&var={SOURCE_ID}&ymid={CLICK_ID}';
        }, { passive: true });

        // Prevent accidental back navigation on mobile
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', function() {
            history.pushState(null, null, location.href);
        });
    </script>
</body>
</html>
