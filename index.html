<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Access - Exclusive Offer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFB800;
            --primary-glow: rgba(255, 184, 0, 0.5);
            --bg-milky: #f0f4f8;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-milky);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 184, 0, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 184, 0, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Animated Floating Bubbles for Game-like feel */
        .bubble {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(40px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }

        .b1 { width: 300px; height: 300px; top: -100px; left: -100px; background: var(--primary); }
        .b2 { width: 250px; height: 250px; bottom: -50px; right: -50px; background: #3b82f6; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        .icon-wrapper {
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        .icon-bg {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
            animation: bounce 3s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .icon-bg svg {
            width: 50px;
            height: 50px;
            color: var(--primary);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 16px;
            line-height: 1.1;
        }

        p {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .cta-container {
            position: relative;
        }

        .main-btn {
            display: block;
            width: 100%;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            padding: 24px 30px;
            border-radius: 24px;
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 0 #d97706, 0 20px 40px rgba(255, 184, 0, 0.3);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: none;
        }

        .main-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 0 #d97706, 0 25px 50px rgba(255, 184, 0, 0.4);
        }

        .main-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #d97706, 0 10px 20px rgba(255, 184, 0, 0.2);
        }

        /* Sparkle effects */
        .sparkle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
        }

        .trust-signal {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Mobile specific */
        @media (max-width: 480px) {
            .container {
                padding: 40px 24px;
                border-radius: 32px;
            }
            h1 { font-size: 28px; }
            p { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="bubble b1"></div>
    <div class="bubble b2"></div>

    <div class="container">
        <div class="icon-wrapper">
            <div class="icon-bg">
                <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
            </div>
        </div>

        <h1>Ready to Claim Your Reward?</h1>
        <p>A personalized offer has been generated based on your profile. Access is limited and will expire shortly.</p>

        <div class="cta-container">
            <a href="https://1buv.com/link?z=10462815&var={SOURCE_ID}&ymid={CLICK_ID}" class="main-btn" id="final-cta">
                Claim Access Now
            </a>
        </div>

        <div class="trust-signal">
            <div class="dot"></div>
            <span>Limited availability left</span>
        </div>
    </div>

    <script>
        // Game-like click effect
        document.querySelector('.main-btn').addEventListener('click', function(e) {
            // Optional: Add a quick loading state before redirect
            const btn = e.target;
            btn.innerHTML = "Opening Invite...";
            btn.style.pointerEvents = "none";
        });

        // URL Parameter handling
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sourceId = urlParams.get('source_id') || 'tiktok_ad';
            const clickId = urlParams.get('click_id') || 'direct_visitor';
            
            const cta = document.getElementById('final-cta');
            let href = cta.getAttribute('href');
            href = href.replace('{SOURCE_ID}', sourceId).replace('{CLICK_ID}', clickId);
            cta.setAttribute('href', href);
        };
    </script>
</body>
</html>
